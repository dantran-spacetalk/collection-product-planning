<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacetalk — FY2026 Executive Brief</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0D1F3C; --teal:#00A896; --teal-l:#E0F5F3;
  --red:#E63946; --red-l:#FDE8EA;
  --amber:#F4A261; --amber-l:#FEF3E2;
  --green:#1D9E75; --green-l:#E1F5EE;
  --off:#F7F9FC; --slate:#64748B; --mid:#94A3B8;
  --border:#E2E8F0; --dark:#1E293B;
}
html,body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:var(--navy); }

#deck-wrapper {
  width:calc(100% - 3rem); max-width:1440px;
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
}
.site-logo { display:block; height:24px; opacity:0.7; margin-bottom:1.25rem; }

#deck {
  width:100%;
  aspect-ratio:16/9;
  position:relative; overflow:hidden;
  border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,0.35);
}

.slide {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  opacity:0; pointer-events:none;
  transition:opacity 0.22s ease;
  display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden;
  border-radius:12px;
}
.slide.active { opacity:1; pointer-events:all; }
.slide > * { min-height:0; }

/* LOGO */
.cover-logo { height:36px; margin-bottom:1.2rem; display:block; opacity:0.9; }

/* NAV */
#nav {
  position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:row; align-items:center; gap:8px;
  z-index:99999; background:rgba(8,18,36,0.93); backdrop-filter:blur(14px);
  padding:7px 14px; border-radius:40px; border:1px solid rgba(255,255,255,0.13);
  white-space:nowrap;
}
#nav-dots { display:flex; flex-direction:row; align-items:center; gap:4px; }
.nd { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.25); cursor:pointer; transition:all .18s; flex-shrink:0; }
.nd.on { background:var(--teal); transform:scale(1.5); }
.nb { background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; font-size:14px; padding:1px 5px; line-height:1; transition:color .12s; flex-shrink:0; font-family:'DM Sans',sans-serif; }
.nb:hover { color:#fff; }
#nav-ctr { font-size:10px; color:rgba(255,255,255,0.32); letter-spacing:.06em; min-width:32px; text-align:center; flex-shrink:0; }

/* SHARED */
.bg-navy { background:var(--navy); }
.bg-off   { background:var(--off); }
.pad { padding:2.5rem 3.5rem; flex:1; display:flex; flex-direction:column; }
.eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; font-weight:500; color:var(--teal); margin-bottom:.35rem; }
.sh2 { font-family:'DM Serif Display',serif; font-size:clamp(1.4rem,2.2vw,1.9rem); line-height:1.2; margin-bottom:.3rem; }
.sh2.light { color:var(--dark); }
.sh2.dark  { color:#fff; }
.ssub { font-size:12px; color:var(--slate); margin-bottom:.9rem; }
.ssub.dark { color:var(--mid); }

/* COVER */
.cover-inner { flex:1; display:flex; align-items:center; padding:5rem 6rem; position:relative; overflow:hidden; }
.cover-stripe { position:absolute; left:0; top:0; width:4px; height:100%; background:var(--teal); }
.cover-ring  { position:absolute; right:-60px; top:50%; transform:translateY(-50%); width:480px; height:480px; border-radius:50%; border:1px solid rgba(0,168,150,0.1); pointer-events:none; }
.cover-ring2 { position:absolute; right:80px;  top:50%; transform:translateY(-50%); width:300px; height:300px; border-radius:50%; border:1px solid rgba(0,168,150,0.07); pointer-events:none; }
.cover-h { font-family:'DM Serif Display',serif; font-size:clamp(2.5rem,4.8vw,4.2rem); color:#fff; line-height:1.06; margin-bottom:.85rem; }
.cover-h em { color:var(--teal); font-style:italic; }
.cover-p { font-size:14px; color:var(--mid); line-height:1.75; max-width:460px; margin-bottom:2.25rem; }
.meta-row { display:flex; gap:2.5rem; flex-wrap:wrap; }
.meta-item label { display:block; font-size:9px; letter-spacing:.12em; color:var(--slate); text-transform:uppercase; margin-bottom:3px; }
.meta-item span { font-size:13px; color:#fff; font-weight:500; }

/* CONTEXT CARDS - fitted, not stretched */
.ctx-grid { display:flex; gap:1rem; margin-top:.85rem; align-items:flex-start; }
.ctx-card {
  background:#fff; border-radius:13px;
  padding:1.25rem; border:1px solid var(--border);
  position:relative; overflow:hidden;
  flex:1; min-width:0;
}
.ctx-card::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.ctx-card.r::after { background:var(--red); }
.ctx-card.a::after { background:var(--amber); }
.ctx-card.t::after { background:var(--teal); }
.ctx-n { font-family:'DM Serif Display',serif; font-size:2.2rem; color:var(--border); margin-bottom:.4rem; line-height:1; }
.ctx-card h3 { font-size:13px; font-weight:500; color:var(--dark); margin-bottom:.3rem; }
.ctx-card p { font-size:12px; color:var(--slate); line-height:1.65; }

/* KPI BOXES */
.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:.75rem; margin-top:.85rem; }
.kpi-row-6 { display:grid; grid-template-columns:repeat(3,1fr); gap:.75rem; margin-top:.85rem; }
.kpi-box { border-radius:10px; padding:.85rem 1rem; border:1px solid; }
.kpi-box.neutral { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.08); }
.kpi-box.danger  { background:rgba(230,57,70,.08);  border-color:rgba(230,57,70,.2); }
.kpi-box.success { background:rgba(0,168,150,.08);  border-color:rgba(0,168,150,.2); }
.kpi-box.info    { background:rgba(55,138,221,.08); border-color:rgba(55,138,221,.2); }
.kpi-lbl { font-size:10px; color:var(--mid); margin-bottom:3px; }
.kpi-lbl.danger  { color:#FF8087; }
.kpi-lbl.success { color:var(--teal); }
.kpi-lbl.info    { color:#7EC8F0; }
.kpi-val { font-size:18px; font-weight:500; color:#fff; font-family:'DM Serif Display',serif; }
.kpi-val.danger  { color:var(--red); }
.kpi-val.success { color:var(--teal); }
.kpi-val.info    { color:#7EC8F0; }
.kpi-sub { font-size:10px; color:var(--slate); margin-top:2px; }
.kpi-sub.danger  { color:#FF8087; }
.kpi-sub.success { color:var(--teal); }
.kpi-sub.info    { color:#7EC8F0; }

/* MONTHLY SPLIT */
.month-slide { display:grid !important; grid-template-columns:50% 50%; height:100%; overflow:hidden; }
.month-left  { background:#fff; padding:1.75rem 2rem; overflow-y:auto; display:flex; flex-direction:column; gap:.7rem; }
.month-right { background:var(--navy); padding:1.75rem 2rem; overflow-y:auto; display:flex; flex-direction:column; gap:.8rem; }
.month-fy   { font-size:9px; letter-spacing:.15em; text-transform:uppercase; color:var(--teal); margin-bottom:.1rem; }
.month-name { font-family:'DM Serif Display',serif; font-size:1.9rem; color:var(--dark); line-height:1.1; }
.month-tag  { display:inline-block; font-size:10px; font-weight:500; padding:2px 9px; border-radius:20px; margin-top:.3rem; letter-spacing:.04em; }
.tag-g { background:var(--green-l); color:#085041; }
.tag-a { background:var(--amber-l); color:#854F0B; }
.tag-r { background:var(--red-l);   color:#9B1C1C; }
.tag-t { background:var(--teal-l);  color:#085041; }

/* DATA TABLE */
.dt { width:100%; border-collapse:collapse; font-size:11px; }
.dt thead th { font-size:9px; letter-spacing:.07em; text-transform:uppercase; color:var(--slate); padding:0 0 6px; font-weight:500; text-align:right; border-bottom:1.5px solid var(--border); }
.dt thead th:first-child { text-align:left; }
.dt tbody td { padding:4.5px 0; text-align:right; color:var(--dark); border-bottom:1px solid #F1F5F9; }
.dt tbody td:first-child { text-align:left; color:var(--slate); font-size:10.5px; }
.dt tbody tr:last-child td { border-bottom:none; }
.cu { color:var(--green); font-weight:500; }
.cd { color:var(--red);   font-weight:500; }
.cw { color:#854F0B;      font-weight:500; }
.cn { color:var(--slate); }
.dt-note { background:var(--off); border-radius:8px; padding:.6rem .85rem; border:1px solid var(--border); font-size:10px; color:var(--slate); line-height:1.6; }

/* NARRATIVE */
.situation { font-size:12.5px; line-height:1.75; color:var(--mid); padding:.85rem 1rem; background:rgba(255,255,255,.05); border-radius:10px; border-left:3px solid rgba(255,255,255,.2); }
.ns { display:flex; flex-direction:column; gap:5px; }
.ns-lbl { font-size:9px; letter-spacing:.12em; text-transform:uppercase; font-weight:500; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.ns-lbl::before { content:''; display:inline-block; width:14px; height:2px; border-radius:2px; flex-shrink:0; }
.ns-lbl.good::before  { background:#5DCAA5; } .ns-lbl.good  { color:#5DCAA5; }
.ns-lbl.bad::before   { background:#FF8087; } .ns-lbl.bad   { color:#FF8087; }
.ns-lbl.event::before { background:#F4A261; } .ns-lbl.event { color:#F4A261; }
.ns-lbl.fix::before   { background:var(--teal); } .ns-lbl.fix { color:var(--teal); }
.ni { font-size:11px; line-height:1.55; padding:5px 9px; border-radius:6px; border-left:2px solid; }
.ni.good  { background:rgba(29,158,117,.12); color:#5DCAA5; border-color:var(--green); }
.ni.bad   { background:rgba(230,57,70,.1);   color:#FF8087; border-color:var(--red); }
.ni.event { background:rgba(244,162,97,.1);  color:#F4A261; border-color:var(--amber); }
.ni.fix   { background:rgba(0,168,150,.1);   color:#5DCAA5; border-color:var(--teal); }

/* PROBLEMS - fitted */
.prob-grid { display:flex; gap:1rem; margin-top:.85rem; align-items:flex-start; }
.prob-card { border-radius:13px; padding:1.2rem; border:1px solid; flex:1; min-width:0; }
.prob-card.r { background:rgba(230,57,70,.06);  border-color:rgba(230,57,70,.25); }
.prob-card.a { background:rgba(244,162,97,.06); border-color:rgba(244,162,97,.25); }
.prob-card.t { background:rgba(0,168,150,.06);  border-color:rgba(0,168,150,.25); }
.prob-card.gr { background:rgba(29,158,117,.06); border-color:rgba(29,158,117,.25); }
.pstat { font-family:'DM Serif Display',serif; font-size:2.4rem; margin-bottom:.15rem; line-height:1; }
.pstat.r { color:var(--red); } .pstat.a { color:var(--amber); } .pstat.t { color:var(--teal); } .pstat.gr { color:var(--green); }
.plbl { font-size:9px; letter-spacing:.12em; text-transform:uppercase; font-weight:500; margin-bottom:.3rem; }
.plbl.r { color:#FF8087; } .plbl.a { color:#F4A261; } .plbl.t { color:var(--teal); } .plbl.gr { color:#5DCAA5; }
.prob-card h3 { font-size:13px; font-weight:500; color:#fff; margin-bottom:.3rem; }
.prob-card .pb { font-size:11.5px; color:var(--mid); line-height:1.65; margin-bottom:.65rem; }
.pfix { font-size:11px; line-height:1.6; padding:.5rem .75rem; border-radius:7px; border-left:2px solid; }
.pfix.r  { background:rgba(230,57,70,.1);  color:#FF8087; border-color:var(--red); }
.pfix.a  { background:rgba(244,162,97,.1); color:#F4A261; border-color:var(--amber); }
.pfix.t  { background:rgba(0,168,150,.1);  color:#5DCAA5; border-color:var(--teal); }
.pfix.gr { background:rgba(29,158,117,.1); color:#5DCAA5; border-color:var(--green); }

/* RECOVERY - fitted and aligned */
.rec-grid { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-top:.85rem; align-content:start; }
.rec-card { background:#fff; border-radius:13px; padding:.95rem 1.1rem; border:1px solid var(--border); display:flex; gap:.7rem; align-items:flex-start; }
.rec-n { font-family:'DM Serif Display',serif; font-size:1.8rem; min-width:30px; line-height:1; flex-shrink:0; }
.rec-n.r { color:var(--red); } .rec-n.a { color:var(--amber); } .rec-n.t { color:var(--teal); }
.rec-card h4 { font-size:12.5px; font-weight:500; color:var(--dark); margin-bottom:.22rem; }
.rec-card p  { font-size:11px; color:var(--slate); line-height:1.6; }
.rbadge { display:inline-block; font-size:10px; font-weight:500; padding:2px 7px; border-radius:20px; margin-top:.4rem; }
.rb-r { background:#FDE8EA; color:var(--red); }
.rb-a { background:var(--amber-l); color:#854F0B; }
.rb-t { background:var(--teal-l);  color:#085041; }

/* FORECAST */
.fc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-top:.85rem; }
.fc-card { border-radius:13px; padding:1.1rem; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); }
.fc-card.feat { border-color:var(--teal); background:rgba(0,168,150,.08); }
.fc-mo    { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mid); margin-bottom:.25rem; }
.fcb { font-size:10px; font-weight:500; padding:2px 8px; border-radius:20px; display:inline-block; margin-bottom:.6rem; }
.fbr { background:rgba(244,162,97,.2); color:#F4A261; }
.fbg { background:rgba(148,163,184,.2); color:var(--mid); }
.fbt { background:rgba(0,168,150,.2);  color:var(--teal); }
.fc-gross { font-family:'DM Serif Display',serif; font-size:1.65rem; color:#fff; margin-bottom:.1rem; }
.fc-net   { font-size:12px; color:var(--teal); font-weight:500; margin-bottom:.6rem; }
.fc-items { display:flex; flex-direction:column; gap:4px; }
.fit      { font-size:11px; color:var(--mid); padding:4px 7px; background:rgba(255,255,255,.04); border-radius:5px; border-left:2px solid rgba(255,255,255,.1); }
.fit.t    { border-color:var(--teal); color:#5DCAA5; }
.fc-totals { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-top:1rem; }
.fc-total { background:rgba(255,255,255,.05); border-radius:11px; padding:.85rem 1rem; border:1px solid rgba(255,255,255,.08); }
.fc-total label { font-size:10px; color:var(--mid); display:block; margin-bottom:3px; }
.fc-total span  { font-size:19px; font-weight:500; color:#fff; font-family:'DM Serif Display',serif; }
.fc-total small { font-size:10px; color:var(--slate); }

/* ASK */
.ask-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.85rem; margin-top:.85rem; align-content:start; }
.ask-card { background:#fff; border-radius:13px; padding:1.1rem; border:1px solid var(--border); position:relative; }
.ask-card::before { position:absolute; top:.8rem; right:.8rem; font-size:9px; font-weight:500; letter-spacing:.1em; padding:2px 7px; border-radius:20px; }
.ask-card.crit::before { content:'CRITICAL'; background:#FDE8EA; color:var(--red); }
.ask-card.high::before { content:'HIGH';     background:var(--amber-l); color:#854F0B; }
.ask-card h3 { font-size:13.5px; font-weight:500; color:var(--dark); margin-bottom:.3rem; padding-right:75px; }
.ask-card p  { font-size:11.5px; color:var(--slate); line-height:1.68; }

/* CLOSE */
.close-stripe { position:absolute; left:0; top:0; width:4px; height:100%; background:var(--teal); }
.close-q { font-family:'DM Serif Display',serif; font-size:clamp(2rem,3.8vw,3.4rem); color:#fff; line-height:1.2; max-width:680px; margin-bottom:1.25rem; }
.close-q em { color:var(--teal); font-style:italic; }
.close-p { font-size:14px; color:var(--mid); line-height:1.8; max-width:560px; margin-bottom:2rem; }
.close-mos { display:flex; gap:1rem; }
.close-mo { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:11px; padding:.8rem 1.1rem; }
.close-mo label { font-size:10px; color:var(--teal); letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:2px; }
.close-mo span  { font-size:14px; font-weight:500; color:#fff; }
.close-mo small { display:block; font-size:10px; color:var(--mid); margin-top:1px; }

/* ===== RESPONSIVE ===== */

.theme-impact-grid { grid-template-columns:1fr 1fr; }
.overview-products-grid { }

/* Tablet */
@media (max-width:1024px) {
  #deck-wrapper { width:calc(100% - 2rem); }
  #deck { aspect-ratio:auto; height:calc(100vh - 5rem); }
  .pad { padding:1.8rem 2rem; }
  .cover-inner { padding:3rem 3rem; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .kpi-row-6 { grid-template-columns:repeat(2,1fr); }
  .month-slide { grid-template-columns:1fr !important; height:auto !important; }
  .month-left, .month-right { padding:1.5rem 1.75rem; }
  .prob-grid { flex-direction:column; }
  .rec-grid { grid-template-columns:1fr; }
  .fc-grid { grid-template-columns:1fr; }
  .fc-totals { grid-template-columns:1fr; }
  .ask-grid { grid-template-columns:1fr; }
  .ctx-grid { flex-direction:column; }
  .close-mos { flex-direction:column; gap:.6rem; }
  .theme-impact-grid { grid-template-columns:1fr; }
  .overview-products-grid { grid-template-columns:1fr !important; }
}

/* Mobile */
@media (max-width:640px) {
  #deck-wrapper { width:calc(100% - 1rem); }
  #deck { aspect-ratio:auto; height:calc(100vh - 5rem); border-radius:10px; }
  .site-logo { height:18px; margin-bottom:0.5rem; }
  .slide { padding-bottom:3rem; border-radius:10px; }
  .pad { padding:1.2rem 1rem; }
  .cover-inner { padding:2rem 1.5rem; }
  .close-inner { padding:2rem 1.5rem !important; align-items:flex-start !important; }
  .cover-h { font-size:clamp(1.6rem,7vw,2.4rem); }
  .cover-p { font-size:13px; max-width:100%; }
  .cover-ring, .cover-ring2 { display:none; }
  .meta-row { flex-direction:column; gap:.8rem; }
  .sh2 { font-size:clamp(1.1rem,4.5vw,1.5rem); }
  .kpi-row { grid-template-columns:1fr 1fr; gap:.5rem; }
  .kpi-row-6 { grid-template-columns:1fr; }
  .kpi-box { padding:.65rem .75rem; }
  .kpi-val { font-size:15px; }
  .month-slide { grid-template-columns:1fr !important; height:auto !important; }
  .month-left, .month-right { padding:1.2rem 1rem; }
  .month-name { font-size:1.4rem; }
  .dt { font-size:10px; }
  .dt thead th { font-size:8px; }
  .situation { font-size:11.5px; padding:.65rem .75rem; }
  .ni { font-size:10px; }
  .prob-grid { flex-direction:column; gap:.75rem; }
  .prob-card h3 { font-size:12px; }
  .prob-card .pb { font-size:10.5px; }
  .pfix { font-size:10px; }
  .pstat { font-size:1.8rem; }
  .rec-grid { grid-template-columns:1fr; gap:.6rem; }
  .rec-card { padding:.75rem .85rem; }
  .fc-grid { grid-template-columns:1fr; gap:.75rem; }
  .fc-totals { grid-template-columns:1fr; gap:.5rem; }
  .ask-grid { grid-template-columns:1fr; gap:.6rem; }
  .ask-card h3 { font-size:12.5px; padding-right:65px; }
  .ask-card p { font-size:10.5px; }
  .close-q { font-size:clamp(1.4rem,6vw,2.4rem); }
  .close-p { font-size:13px; max-width:100%; }
  .close-mos { flex-direction:column; gap:.5rem; }
  .close-mo { padding:.6rem .85rem; }
  .ctx-grid { flex-direction:column; gap:.75rem; }
  .ctx-card p { font-size:11px; }
  #nav { padding:5px 10px; gap:5px; bottom:.8rem; }
  .nd { width:5px; height:5px; }
  #nav-ctr { font-size:9px; }
  .nb { font-size:12px; }
  .theme-impact-grid { grid-template-columns:1fr; }
  .overview-products-grid { grid-template-columns:1fr !important; }
}
</style>
</head>
<body>
<div id="deck-wrapper">
  <img src="https://cdn.shopify.com/s/files/1/2141/2237/files/Spacetalk_White-Logo-Small.png" alt="Spacetalk" class="site-logo">
  <div id="deck"></div>
</div>
<nav id="nav">
  <button class="nb" id="prev-btn">&#8592;</button>
  <div id="nav-dots"></div>
  <span id="nav-ctr">1/1</span>
  <button class="nb" id="next-btn">&#8594;</button>
</nav>

<script>
/* DATA */
const MONTHS = [
  {
    mo:'Jul 2025', fy:'FY2026', tag:'Strong start', tagCls:'tag-g',
    situation:'FY2026 opened well with revenue doubling year on year. Shopify was the only place to buy a watch plan, plan sales were growing fast, and the funnel was converting intent-led buyers well. The main risk underneath all of this was that nearly 40% of every session had to be bought through paid ads.',

addSlide(`
<div class="pad bg-navy">
  <p class="eyebrow">What went wrong and what has been fixed</p>
  <h2 class="sh2 dark">Three problems. Two resolved. One still being worked through.</h2>
  <p class="ssub dark">It matters that these are understood separately. They had different causes and different solutions.</p>
  <div class="prob-grid">
    <div class="prob-card r">
      <div class="pstat r">-74%</div>
      <p class="plbl r">Ongoing / App experience</p>
      <h3>The app launched before it was ready</h3>
      <p class="pb">The Freedom Platform launched the weekend before Black Friday. It broke things for existing customers. Watches unpaired, contacts disappeared. New buyers arrived on Black Friday to an app that did not work as described. Reviews built up on Trustpilot and ProductReview and are still there. Desktop conversion collapsed to 0.6% in January. The broader app experience, including onboarding, key features, and usability, still needs attention and is affecting how new buyers experience the product.</p>
      <div class="pfix r">Still in progress: Responding to every unanswered review, generating fresh positive reviews from happy long-term customers, and working with CS on a project to identify satisfied users and direct them to leave a review on Trustpilot or ProductReview.</div>
    </div>
    <div class="prob-card a">
      <div class="pstat a">56.6%</div>
      <p class="plbl a">Resolved / Billing sync failure</p>
      <h3>A Shopify plan sync bug in February</h3>
      <p class="pb">For about two weeks in early February, plans purchased through Shopify were not appearing in the app. Customers assumed they had no plan, bought a second one through the app, then refunded the Shopify purchase. This caused the 56.6% refund rate in February. This was a technical billing failure, not customers being unhappy with the product. The refund spike from February should not be read as a sentiment signal.</p>
      <div class="pfix a">Resolved in February. The sync was fixed within two weeks of discovery. Shopify plan refund rates dropped back to normal levels in March and April.</div>
    </div>
    <div class="prob-card gr">
      <div class="pstat gr">Blocked</div>
      <p class="plbl gr">Resolved / Chinese bot attack</p>
      <h3>Bot traffic inflating March sessions</h3>
      <p class="pb">In March, 20,162 fraudulent sessions were injected into the site from Chinese bot networks. These sessions had an average duration of 1.3 seconds, a 78% bounce rate, and zero purchases. They were artificially inflating the total session count and making conversion rate look worse than it was. Once removed, Australian traffic converted at 2.54%, above the pre-crisis baseline.</p>
      <div class="pfix gr">Blocked in March. Traffic has been clean since. All data from March onwards is free of this interference.</div>
    </div>
  </div>
</div>
`, 'bg-navy');

  <div class="ask-grid">
    <div class="ask-card crit"><h3>App experience and stability</h3><p>The app launching before it was ready is the root cause of the trust problem that is still costing us desktop conversions today. Beyond the billing sync issue that has been fixed, there are onboarding gaps, user experience issues, and features that may not be working as expected for some customers. These need to be understood and prioritised. Until the app experience matches the promise of the product, the review problem will not fully resolve and new buyer sentiment will remain fragile.</p></div>

/* NAVIGATION */
const dotsEl  = document.getElementById('nav-dots');
const ctrEl   = document.getElementById('nav-ctr');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const TOTAL   = slideDefs.length;
let cur = 0;

slideDefs.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'nd' + (i === 0 ? ' on' : '');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function goTo(n) {
  if (n < 0 || n >= TOTAL) return;
  slideDefs[cur].classList.remove('active');
  dotsEl.children[cur].classList.remove('on');
  cur = n;
  slideDefs[cur].classList.add('active');
  dotsEl.children[cur].classList.add('on');
  ctrEl.textContent = (cur + 1) + '/' + TOTAL;
  if (cur === 2) setTimeout(buildOverviewChart, 80);
}

slideDefs[0].classList.add('active');
ctrEl.textContent = '1/' + TOTAL;
prevBtn.addEventListener('click', () => goTo(cur - 1));
nextBtn.addEventListener('click', () => goTo(cur + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(cur + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(cur - 1);
});
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) goTo(dx < 0 ? cur + 1 : cur - 1);
});

let chartBuilt = false;
function buildOverviewChart() {
  if (chartBuilt) return;
  chartBuilt = true;
  const canvas = document.getElementById('overviewChart');
  if (!canvas) return;
  const lbl = ['Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr'];
  new Chart(canvas, {
    type: 'bar',
    data: {
      labels: lbl,
      datasets: [
        { label:'FY2025', data:FY25_NET, backgroundColor:'rgba(94,118,149,0.55)', borderRadius:4 },
        { label:'FY2026', data:FY26_NET, backgroundColor:FY26_NET.map((v,i)=>v>=FY25_NET[i]?'#1D9E75':'#E63946'), borderRadius:4 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y+'K'}} },
      scales:{
        x:{ ticks:{color:'#94A3B8',font:{size:10}}, grid:{display:false} },
        y:{ ticks:{color:'#94A3B8',font:{size:10},callback:v=>'$'+v+'K'}, grid:{color:'rgba(255,255,255,0.06)'} }
      },
      onClick:(e,elements)=>{ if(elements.length>0) goTo(3+elements[0].index); }
    }
  });
}
</script>
